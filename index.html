<!doctype html>
<html lang="en" class="preload-active">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Brovet Animal Healthcare — premium veterinary feed supplements, liquid calcium, and livestock nutrition products from Navsari, Gujarat."
    />
    <title>Brovet Animal Healthcare | Premium Veterinary Products India</title>
    <style>
      html.preload-active,
      html.preload-active body {
        overflow: hidden;
      }
      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background:
          radial-gradient(ellipse 80% 50% at 50% -10%, rgba(240, 253, 244, 0.9) 0%, transparent 55%),
          linear-gradient(160deg, #f8fafc 0%, #f0fdf4 45%, #e2e8f0 100%);
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #app-preloader.app-preloader--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-preloader .preloader-mark {
        width: 88px;
        height: 88px;
        border-radius: 1.25rem;
        background: #fff;
        box-shadow: 0 12px 40px rgba(15, 81, 50, 0.14);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: preloaderPulse 1.6s ease-in-out infinite;
      }
      #app-preloader .preloader-mark img {
        width: 64px;
        height: 64px;
        object-fit: contain;
      }
      #app-preloader .preloader-brand {
        margin: 0;
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #0f5132;
      }
      #app-preloader .preloader-bar {
        width: 120px;
        height: 3px;
        border-radius: 999px;
        background: rgba(15, 81, 50, 0.12);
        overflow: hidden;
      }
      #app-preloader .preloader-bar > span {
        display: block;
        height: 100%;
        width: 40%;
        border-radius: inherit;
        background: linear-gradient(90deg, #0f5132, #0d9488);
        animation: preloaderSlide 1.1s ease-in-out infinite;
      }
      @keyframes preloaderPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
      }
      @keyframes preloaderSlide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }
    </style>
    <script>
      window.__BROVET_PRELOAD_STARTED__ = Date.now();
    </script>
  </head>
  <body>
    <div id="app-preloader" role="status" aria-live="polite" aria-label="Loading Brovet Animal Healthcare">
      <div class="preloader-mark">
        <img src="/apple-touch-icon.png" alt="" width="64" height="64" />
      </div>
      <p class="preloader-brand">Brovet Animal Healthcare</p>
      <div class="preloader-bar" aria-hidden="true"><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
